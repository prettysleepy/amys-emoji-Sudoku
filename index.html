<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoji Sudoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">EMOJI LOGIC PUZZLE</p>
      <h1>Emoji Sudoku</h1>
      <a class="subtitle" href="https://studentandwriter.com/" target="_blank" rel="noopener">Students and Writers Blog</a>
    </header>

    <section class="game-wrap" aria-label="Emoji Sudoku game">
      <aside class="panel">
        <h2>Choose 9 emojis</h2>
        <p>Pick any nine symbols for your puzzle, or use the random button.</p>
        <div class="selected-strip" id="selectedStrip" aria-label="Selected emojis"></div>
        <p class="selection-count" id="selectionCount">9 of 9 selected</p>
        <div class="emoji-library" id="emojiLibrary" aria-label="Emoji choices"></div>
        <button id="randomizeEmojis" type="button">Random Emojis</button>
        <button id="startPuzzle" type="button">Submit & Start Playing</button>
        <button id="newPuzzle" type="button">New Puzzle</button>
        <button id="checkPuzzle" type="button" class="secondary">Check Puzzle</button>
        <p class="message" id="message" role="status" aria-live="polite"></p>
      </aside>

      <section class="board-area">
        <div class="sudoku-grid" id="sudokuGrid" aria-label="9 by 9 sudoku board"></div>
        <div class="palette" id="palette" aria-label="Emoji answer palette"></div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
